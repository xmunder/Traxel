services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: ${SERVICE_NAME:-vectorizer-backend}
      SERVICE_VERSION: ${SERVICE_VERSION:-0.1.0}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OBS_USERNAME: ${OBS_USERNAME:-}
      OBS_SECRET: ${OBS_SECRET:-}
      OBS_DB_PATH: ${OBS_DB_PATH:-data/obs.db}
      OBS_RETENTION_DAYS: ${OBS_RETENTION_DAYS:-30}
    ports:
      - "8000:8000"
    volumes:
      - obs_data:/app/data
    networks:
      - vectorizer-app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PUBLIC_BACKEND_ENDPOINT: ${PUBLIC_BACKEND_ENDPOINT:-http://localhost:8000}
    ports:
      - "4321:4321"
    networks:
      - vectorizer-app

networks:
  vectorizer-app:
    name: ${VECTORIZER_NETWORK_NAME:-vectorizer-app}

volumes:
  obs_data:
